<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Villa El Alba | Mapa de Pasajes</title>
    <meta name="description" content="Mapa de pasajes de Villa El Alba con filtros por zona, buscador de direcciones y galerias de imagenes por direccion.">
    <meta name="theme-color" content="#14324a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        :root {
            --bg: #f4efe6;
            --bg-soft: #fbf8f2;
            --panel: rgba(255, 251, 245, 0.86);
            --panel-strong: #fffdf8;
            --ink: #173042;
            --muted: #5a6974;
            --line: rgba(23, 48, 66, 0.12);
            --shadow: 0 18px 38px rgba(23, 48, 66, 0.12);
            --north: #1f6db4;
            --center: #15906d;
            --south: #d1593e;
            --accent: #f2b766;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: "Manrope", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(242, 183, 102, 0.24), transparent 34%),
                radial-gradient(circle at top right, rgba(21, 144, 109, 0.16), transparent 30%),
                linear-gradient(180deg, #efe8db 0%, #f7f3ec 45%, #f3ede4 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(23, 48, 66, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(23, 48, 66, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 85%);
        }

        .page-shell {
            position: relative;
            max-width: 1480px;
            margin: 0 auto;
            padding: 28px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 26px;
            background: var(--panel);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(300px, 0.9fr);
            gap: 18px;
            margin-bottom: 18px;
        }

        .hero-copy,
        .hero-stats,
        .controls,
        .map-panel,
        .list-panel {
            padding: 24px;
        }

        .hero-copy {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background:
                linear-gradient(135deg, rgba(20, 50, 74, 0.95), rgba(25, 92, 120, 0.88)),
                linear-gradient(180deg, rgba(242, 183, 102, 0.22), transparent);
            color: #f9f6ef;
            overflow: hidden;
            position: relative;
        }

        .hero-copy::after {
            content: "";
            position: absolute;
            width: 180px;
            height: 180px;
            right: -20px;
            top: -20px;
            border-radius: 50%;
            background: rgba(242, 183, 102, 0.28);
            filter: blur(6px);
        }

        .eyebrow {
            display: inline-flex;
            width: fit-content;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            font-size: 0.82rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            max-width: 12ch;
            margin-top: 14px;
            font-size: clamp(2.2rem, 4vw, 4rem);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        .hero-stats {
            display: grid;
            gap: 14px;
            background: linear-gradient(180deg, rgba(255, 253, 248, 0.92), rgba(255, 249, 241, 0.82));
            align-content: start;
        }

        .hero-stats h2 {
            font-size: 0.98rem;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
            gap: 12px;
        }

        .stat-card {
            padding: 18px;
            border-radius: 20px;
            background: var(--panel-strong);
            border: 1px solid rgba(23, 48, 66, 0.08);
        }

        .stat-card strong {
            display: block;
            font-size: 1.9rem;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .stat-card span {
            display: block;
            margin-top: 8px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(320px, 1fr);
            gap: 16px;
            margin-bottom: 18px;
        }

        .field-label {
            display: block;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .search-input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(23, 48, 66, 0.14);
            background: rgba(255, 255, 255, 0.78);
            color: var(--ink);
            font: inherit;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .search-input:focus,
        .zone-filter:focus,
        .reset-button:focus,
        .list-card:focus,
        .popup-link:focus {
            outline: 3px solid rgba(31, 109, 180, 0.16);
            outline-offset: 2px;
        }

        .zone-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .zone-filter,
        .reset-button {
            border: 1px solid rgba(23, 48, 66, 0.12);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.84);
            color: var(--ink);
            cursor: pointer;
            font: inherit;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .zone-filter {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            font-weight: 700;
        }

        .zone-filter span {
            display: inline-flex;
            min-width: 28px;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(23, 48, 66, 0.06);
            color: var(--muted);
            font-size: 0.78rem;
        }

        .zone-filter.active {
            background: var(--ink);
            color: #fffdf8;
            border-color: transparent;
            transform: translateY(-1px);
        }

        .zone-filter.active span {
            background: rgba(255, 255, 255, 0.14);
            color: #fffdf8;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(340px, 0.75fr);
            gap: 18px;
            align-items: start;
        }

        .map-panel,
        .list-panel {
            display: flex;
            flex-direction: column;
        }

        .map-panel {
            min-height: 0;
            position: sticky;
            top: 24px;
        }

        .list-panel {
            min-height: 0;
            max-height: calc(100vh - 48px);
            overflow: hidden;
        }

        .panel-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 18px;
        }

        .panel-head h2 {
            font-size: 1.3rem;
            letter-spacing: -0.03em;
        }

        .panel-head p {
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            justify-content: flex-end;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        #map {
            width: 100%;
            height: clamp(360px, 50vh, 500px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(23, 48, 66, 0.12);
            background: #dfe7ea;
        }

        .reset-button {
            padding: 11px 16px;
            font-weight: 700;
        }

        .reset-button:hover,
        .zone-filter:hover,
        .list-card:hover,
        .popup-link:hover {
            transform: translateY(-1px);
        }

        .results-list {
            display: grid;
            flex: 1;
            min-height: 0;
            gap: 10px;
            overflow: auto;
            padding-right: 4px;
        }

        .list-card {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            border-radius: 20px;
            border: 1px solid rgba(23, 48, 66, 0.1);
            background: rgba(255, 255, 255, 0.72);
            color: inherit;
            cursor: pointer;
            font: inherit;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .list-card.active {
            border-color: rgba(23, 48, 66, 0.26);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 14px 30px rgba(23, 48, 66, 0.08);
        }

        .list-card-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
        }

        .list-card-title {
            display: block;
            font-size: 1rem;
            line-height: 1.3;
            letter-spacing: -0.02em;
            font-weight: 800;
        }

        .list-card-subtitle {
            display: block;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .zone-pill {
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #fffdf8;
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .meta-chip {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(23, 48, 66, 0.06);
        }

        .empty-state {
            padding: 22px;
            border-radius: 22px;
            border: 1px dashed rgba(23, 48, 66, 0.18);
            background: rgba(255, 255, 255, 0.46);
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }

        .leaflet-control-layers,
        .leaflet-bar {
            border: 1px solid rgba(23, 48, 66, 0.12) !important;
            box-shadow: 0 10px 25px rgba(23, 48, 66, 0.12) !important;
            border-radius: 16px !important;
            overflow: hidden;
        }

        .leaflet-control-layers {
            background: rgba(255, 255, 255, 0.94) !important;
            font-family: inherit;
        }

        .leaflet-popup-content-wrapper {
            border-radius: 22px;
            padding: 4px;
            box-shadow: 0 18px 40px rgba(23, 48, 66, 0.18);
        }

        .leaflet-popup-content {
            margin: 0;
            width: min(320px, 72vw) !important;
            font-family: inherit;
        }

        .popup-card {
            padding: 16px;
        }

        .popup-card .zone-pill {
            display: inline-flex;
            margin-bottom: 12px;
        }

        .popup-card h3 {
            font-size: 1.1rem;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .popup-card p {
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.55;
        }

        .popup-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 14px;
        }

        .popup-grid a {
            display: block;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 14px;
            background: rgba(23, 48, 66, 0.08);
            cursor: zoom-in;
        }

        .popup-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.18s ease;
        }

        .popup-grid a:hover img {
            transform: scale(1.04);
        }

        .popup-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .popup-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            color: #fffdf8;
            background: var(--ink);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 700;
            transition: transform 0.18s ease, opacity 0.18s ease;
        }

        .popup-link.secondary {
            color: var(--ink);
            background: rgba(23, 48, 66, 0.08);
        }

        .zone-label {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(23, 48, 66, 0.12);
            color: var(--ink);
            border-radius: 999px;
            padding: 4px 10px;
            font-family: inherit;
            font-size: 0.76rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            box-shadow: none;
        }

        .lightbox[hidden] {
            display: none !important;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(10, 20, 31, 0.76);
            backdrop-filter: blur(10px);
        }

        .lightbox-shell {
            width: min(920px, 100%);
            max-height: calc(100vh - 48px);
            padding: 18px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            background: rgba(255, 252, 247, 0.96);
            box-shadow: 0 28px 80px rgba(10, 20, 31, 0.32);
        }

        .lightbox-bar {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
        }

        .lightbox-count {
            margin-bottom: 10px;
            color: #f9f6ef;
            background: rgba(20, 50, 74, 0.9);
            border-color: transparent;
        }

        .lightbox-title {
            font-size: clamp(1.35rem, 2vw, 1.8rem);
            letter-spacing: -0.04em;
        }

        .lightbox-stage {
            position: relative;
            margin-top: 16px;
        }

        .lightbox-frame {
            margin: 0;
            min-height: min(62vh, 680px);
            padding: 18px 64px;
            border-radius: 22px;
            background: linear-gradient(180deg, #102131 0%, #163246 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .lightbox-frame img {
            max-width: 100%;
            max-height: min(58vh, 620px);
            display: block;
            object-fit: contain;
            border-radius: 16px;
        }

        .lightbox-caption {
            margin-top: 14px;
            color: var(--muted);
        }

        .lightbox-close,
        .lightbox-nav {
            border: 0;
            background: rgba(255, 255, 255, 0.92);
            color: var(--ink);
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            box-shadow: 0 12px 26px rgba(10, 20, 31, 0.16);
            transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
        }

        .lightbox-close:hover {
            transform: translateY(-1px);
        }

        .lightbox-nav:hover {
            transform: translateY(-50%) scale(1.03);
        }

        .lightbox-close {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.35rem;
            line-height: 1;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 1.5rem;
            line-height: 1;
        }

        .lightbox-nav.prev {
            left: 12px;
        }

        .lightbox-nav.next {
            right: 12px;
        }

        .lightbox-nav[disabled] {
            opacity: 0.42;
            cursor: default;
            transform: translateY(-50%);
        }

        @media (max-width: 1120px) {
            .hero,
            .controls,
            .layout {
                grid-template-columns: 1fr;
            }

            .map-panel,
            .list-panel {
                min-height: initial;
                max-height: none;
                position: static;
                overflow: visible;
            }

            .legend {
                justify-content: flex-start;
            }
        }

        @media (max-width: 720px) {
            .page-shell {
                padding: 16px;
            }

            .hero-copy,
            .hero-stats,
            .controls,
            .map-panel,
            .list-panel {
                padding: 18px;
            }

            #map {
                height: clamp(320px, 46vh, 400px);
            }

            .panel-head {
                flex-direction: column;
            }

            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }

            .lightbox {
                padding: 12px;
            }

            .lightbox-shell {
                padding: 14px;
            }

            .lightbox-frame {
                min-height: 46vh;
                padding: 14px 52px;
            }

            .lightbox-nav.prev {
                left: 8px;
            }

            .lightbox-nav.next {
                right: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="hero">
            <section class="hero-copy panel">
                <span class="eyebrow">Villa El Alba</span>
                <h1>Pasajes Villa El Alba</h1>
            </section>

            <aside class="hero-stats panel">
                <h2>Resumen general</h2>
                <div class="stat-grid">
                    <article class="stat-card">
                        <strong id="stat-direcciones">0</strong>
                        <span>Direcciones unicas</span>
                    </article>
                    <article class="stat-card">
                        <strong id="stat-fotos">0</strong>
                        <span>Fotos registradas</span>
                    </article>
                    <article class="stat-card">
                        <strong id="stat-norte">0</strong>
                        <span>Norte</span>
                    </article>
                    <article class="stat-card">
                        <strong id="stat-centro">0</strong>
                        <span>Centro</span>
                    </article>
                    <article class="stat-card">
                        <strong id="stat-sur">0</strong>
                        <span>Sur</span>
                    </article>
                </div>
            </aside>
        </header>

        <section class="controls panel">
            <div>
                <label class="field-label" for="searchInput">Buscar direccion</label>
                <input id="searchInput" class="search-input" type="search" placeholder="Ejemplo: Rio Baker 5147 o Laguna San Rafael">
            </div>

            <div>
                <span class="field-label">Filtrar por zona</span>
                <div class="zone-filters" id="zoneFilters">
                    <button type="button" class="zone-filter active" data-zone="Todos">Todos <span id="count-todos">0</span></button>
                    <button type="button" class="zone-filter" data-zone="Norte">Norte <span id="count-norte">0</span></button>
                    <button type="button" class="zone-filter" data-zone="Centro">Centro <span id="count-centro">0</span></button>
                    <button type="button" class="zone-filter" data-zone="Sur">Sur <span id="count-sur">0</span></button>
                </div>
            </div>
        </section>

        <main class="layout">
            <section class="map-panel panel">
                <div class="panel-head">
                    <div>
                        <h2>Mapa interactivo</h2>
                        <p id="resultsLabel">Preparando direcciones...</p>
                    </div>
                    <div class="legend">
                        <span class="legend-item"><span class="legend-swatch" style="background: var(--north);"></span>Norte</span>
                        <span class="legend-item"><span class="legend-swatch" style="background: var(--center);"></span>Centro</span>
                        <span class="legend-item"><span class="legend-swatch" style="background: var(--south);"></span>Sur</span>
                    </div>
                </div>
                <div id="map"></div>
            </section>

            <aside class="list-panel panel">
                <div class="panel-head">
                    <div>
                        <h2>Direcciones</h2>
                        <p>Selecciona una tarjeta para centrar el mapa y abrir su galeria.</p>
                    </div>
                    <button type="button" class="reset-button" id="resetView">Ver todo</button>
                </div>
                <div class="results-list" id="resultsList"></div>
            </aside>
        </main>

    </div>

    <div class="lightbox" id="lightbox" hidden>
        <div class="lightbox-shell" role="dialog" aria-modal="true" aria-labelledby="lightboxTitle">
            <div class="lightbox-bar">
                <div>
                    <span class="eyebrow lightbox-count" id="lightboxCount">Foto 1 de 1</span>
                    <h2 class="lightbox-title" id="lightboxTitle">Galería</h2>
                </div>
                <button type="button" class="lightbox-close" id="lightboxClose" aria-label="Cerrar galería">×</button>
            </div>
            <div class="lightbox-stage">
                <button type="button" class="lightbox-nav prev" id="lightboxPrev" aria-label="Imagen anterior">‹</button>
                <figure class="lightbox-frame">
                    <img id="lightboxImage" alt="">
                </figure>
                <button type="button" class="lightbox-nav next" id="lightboxNext" aria-label="Siguiente imagen">›</button>
            </div>
            <p class="lightbox-caption" id="lightboxCaption"></p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const zoneStyles = {
            Norte: { color: "#1f6db4", soft: "rgba(31, 109, 180, 0.12)" },
            Centro: { color: "#15906d", soft: "rgba(21, 144, 109, 0.12)" },
            Sur: { color: "#d1593e", soft: "rgba(209, 89, 62, 0.12)" }
        };

        const zoneOrder = { Norte: 0, Centro: 1, Sur: 2 };
        const initialBounds = L.latLngBounds([[-33.5470, -70.5660], [-33.5530, -70.5550]]);
        const zoneBounds = {
            Norte: L.latLngBounds([[-33.5470, -70.5660], [-33.5493, -70.5550]]),
            Centro: L.latLngBounds([[-33.5493, -70.5660], [-33.5505, -70.5550]]),
            Sur: L.latLngBounds([[-33.5505, -70.5660], [-33.5530, -70.5550]])
        };

        overlapGroups.forEach((group) => {
            if (group.length === 1) {
                group[0].displayLat = group[0].lat;
                group[0].displayLng = group[0].lng;
                return;
            }

            const radius = 0.00012;

            group.forEach((item, index) => {
                const angle = (Math.PI * 2 * index) / group.length;
                item.displayLat = item.lat + Math.sin(angle) * radius;
                item.displayLng = item.lng + Math.cos(angle) * radius;
            });
        });

        const countsByZone = direcciones.reduce((acc, item) => {
            acc[item.ubicacion] += 1;
            return acc;
        }, { Norte: 0, Centro: 0, Sur: 0 });

        document.getElementById("stat-direcciones").textContent = String(direcciones.length);
        document.getElementById("stat-fotos").textContent = String(pasajes.length);
        document.getElementById("stat-norte").textContent = String(countsByZone.Norte);
        document.getElementById("stat-centro").textContent = String(countsByZone.Centro);
        document.getElementById("stat-sur").textContent = String(countsByZone.Sur);
        document.getElementById("count-todos").textContent = String(direcciones.length);
        document.getElementById("count-norte").textContent = String(countsByZone.Norte);
        document.getElementById("count-centro").textContent = String(countsByZone.Centro);
        document.getElementById("count-sur").textContent = String(countsByZone.Sur);
        function buildImageSrc(imageName) {
            return encodeURI(imageName);
        }

        function renderLightbox() {
            const item = directionById.get(lightboxState.itemId);

            if (!item || !item.imagenes.length) {
                return;
            }

            const total = item.imagenes.length;
            const safeIndex = Math.max(0, Math.min(lightboxState.index, total - 1));
            const src = buildImageSrc(item.imagenes[safeIndex]);

            lightboxState.index = safeIndex;
            lightboxImage.src = src;
            lightboxImage.alt = "Imagen " + (safeIndex + 1) + " de " + item.nombre;
            lightboxTitle.textContent = item.nombre;
            lightboxCount.textContent = "Foto " + (safeIndex + 1) + " de " + total;
            lightboxCaption.textContent = item.ubicacion + " • " + total + " foto(s) disponibles para esta dirección.";
            lightboxPrev.disabled = total < 2;
            lightboxNext.disabled = total < 2;
        }

        function openLightbox(itemId, startIndex) {
            const item = directionById.get(itemId);

            if (!item || !item.imagenes.length) {
                return;
            }

            lightboxState.itemId = item.id;
            lightboxState.index = Number.isFinite(startIndex) ? startIndex : 0;
            renderLightbox();
            lightbox.hidden = false;
            document.body.style.overflow = "hidden";
        }

        function closeLightbox() {
            lightbox.hidden = true;
            document.body.style.overflow = "";
        }

        function stepLightbox(delta) {
            const item = directionById.get(lightboxState.itemId);

            if (!item || item.imagenes.length < 2) {
                return;
            }

            lightboxState.index = (lightboxState.index + delta + item.imagenes.length) % item.imagenes.length;
            renderLightbox();
        }

        function buildPopup(item) {
            const gallery = item.imagenes
                .map((imageName, index) => {
                    const src = buildImageSrc(imageName);
                    return "<a href=\"" + src + "\" data-lightbox-item=\"" + escapeHtml(item.id) + "\" data-lightbox-index=\"" + index + "\"><img src=\"" + src + "\" loading=\"lazy\" alt=\"Imagen de " + escapeHtml(item.nombre) + "\"></a>";
                })
                .join("");

            return [
                "<article class=\"popup-card\">",
                "<span class=\"zone-pill\" style=\"background:" + zoneStyles[item.ubicacion].color + ";\">" + escapeHtml(item.ubicacion) + "</span>",
                "<h3>" + escapeHtml(item.nombre) + "</h3>",
                "<p>" + item.imagenes.length + " foto(s) disponibles para esta direccion.</p>",
                "<div class=\"popup-grid\">" + gallery + "</div>",
                "<div class=\"popup-actions\">",
                "<a class=\"popup-link\" href=\"https://www.google.com/maps?q=" + item.lat + "," + item.lng + "\" target=\"_blank\" rel=\"noopener noreferrer\">Abrir en Google Maps</a>",
                "<a class=\"popup-link secondary\" href=\"" + buildImageSrc(item.imagenes[0]) + "\" data-lightbox-item=\"" + escapeHtml(item.id) + "\" data-lightbox-index=\"0\">Ver galería</a>",
                "</div>",
                "</article>"
            ].join("");
        }

        function getFilteredItems() {
            const query = normalizeText(searchInput.value.trim());

            return direcciones.filter((item) => {
                const matchesZone = activeZone === "Todos" || item.ubicacion === activeZone;
                const matchesSearch = !query || normalizeText(item.nombre + " " + item.ubicacion).includes(query);
                return matchesZone && matchesSearch;
            });
        }

        function renderList(items) {
            if (!items.length) {
                resultsList.innerHTML = "<div class=\"empty-state\">No encontramos resultados con ese filtro.<br>Prueba con otra calle o vuelve a <strong>Ver todo</strong>.</div>";
                return;
            }

            resultsList.innerHTML = items.map((item) => {
                const isActive = item.id === activeId ? " active" : "";
                return [
                    "<button type=\"button\" class=\"list-card" + isActive + "\" data-id=\"" + escapeHtml(item.id) + "\">",
                    "<span class=\"list-card-head\">",
                    "<span>",
                    "<span class=\"list-card-title\">" + escapeHtml(item.nombre) + "</span>",
                    "<span class=\"list-card-subtitle\">Ver fotos y ubicar en el mapa</span>",
                    "</span>",
                    "<span class=\"zone-pill\" style=\"background:" + zoneStyles[item.ubicacion].color + ";\">" + escapeHtml(item.ubicacion) + "</span>",
                    "</span>",
                    "<span class=\"meta-row\">",
                    "<span class=\"meta-chip\">" + item.imagenes.length + " foto(s)</span>",
                    "</span>",
                    "</button>"
                ].join("");
            }).join("");
        }

        function renderMarkers(items) {
            markerLayer.clearLayers();
            markerById = new Map();

            items.forEach((item) => {
                const marker = L.circleMarker([item.displayLat, item.displayLng], {
                    radius: 8,
                    color: "#ffffff",
                    weight: 2,
                    fillColor: zoneStyles[item.ubicacion].color,
                    fillOpacity: 0.94
                })
                    .addTo(markerLayer)
                    .bindPopup(buildPopup(item));

                marker.on("click", () => {
                    activeId = item.id;
                    renderList(items);
                });

                markerById.set(item.id, marker);
            });
        }

        function updateResultsLabel(items) {
            const visiblePhotos = items.reduce((sum, item) => sum + item.imagenes.length, 0);
            resultsLabel.textContent = items.length + " direcciones visibles de " + direcciones.length + " | " + visiblePhotos + " foto(s) filtradas";
        }

        function focusOnItem(item, marker) {
            if (!item || !marker) {
                return;
            }

            activeId = item.id;
            renderList(getFilteredItems());

            if (mapPanel) {
                mapPanel.scrollIntoView({ behavior: "smooth", block: "start" });
            }

            window.setTimeout(() => {
                map.invalidateSize();
                map.once("moveend", () => {
                    marker.openPopup();
                });
                map.flyTo([item.displayLat, item.displayLng], 17, { duration: 0.7 });
            }, 180);
        }

        function render(options) {
            const config = options || {};
            const items = getFilteredItems();
            renderMarkers(items);
            renderList(items);
            updateResultsLabel(items);

            if (config.fitToZone && activeZone !== "Todos" && !searchInput.value.trim()) {
                map.fitBounds(zoneBounds[activeZone].pad(0.08));
            } else if (config.fitAll) {
                map.fitBounds(initialBounds.pad(0.04));
            } else if (config.fitFiltered && items.length) {
                const groupBounds = L.latLngBounds(items.map((item) => [item.displayLat, item.displayLng]));
                map.fitBounds(groupBounds.pad(0.2));
            }
        }

        function setActiveZone(zone) {
            activeZone = zone;
            zoneButtons.forEach((button) => {
                button.classList.toggle("active", button.dataset.zone === zone);
            });
        }

        zoneButtons.forEach((button) => {
            button.addEventListener("click", () => {
                setActiveZone(button.dataset.zone);
                activeId = null;
                render({ fitToZone: activeZone !== "Todos", fitAll: activeZone === "Todos" });
            });
        });

        searchInput.addEventListener("input", () => {
            activeId = null;
            render();
        });

        document.addEventListener("click", (event) => {
            const lightboxTrigger = event.target.closest("[data-lightbox-item]");

            if (lightboxTrigger) {
                event.preventDefault();
                event.stopPropagation();
                openLightbox(lightboxTrigger.dataset.lightboxItem, Number(lightboxTrigger.dataset.lightboxIndex || "0"));
                return;
            }

            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        resultsList.addEventListener("click", (event) => {
            const card = event.target.closest(".list-card");

            if (!card) {
                return;
            }

            activeId = card.dataset.id;
            const marker = markerById.get(activeId);
            const item = getFilteredItems().find((entry) => entry.id === activeId);

            if (!marker || !item) {
                return;
            }

            focusOnItem(item, marker);
        });

        resetButton.addEventListener("click", () => {
            searchInput.value = "";
            activeId = null;
            setActiveZone("Todos");
            render({ fitAll: true });
        });

        lightboxClose.addEventListener("click", closeLightbox);
        lightboxPrev.addEventListener("click", () => stepLightbox(-1));
        lightboxNext.addEventListener("click", () => stepLightbox(1));

        document.addEventListener("keydown", (event) => {
            if (lightbox.hidden) {
                return;
            }

            if (event.key === "Escape") {
                closeLightbox();
            } else if (event.key === "ArrowLeft") {
                stepLightbox(-1);
            } else if (event.key === "ArrowRight") {
                stepLightbox(1);
            }
        });

        render({ fitAll: true });
        window.setTimeout(() => map.invalidateSize(), 120);
    </script>
</body>
</html>
